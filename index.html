<!DOCTYPE html>
<html>
<head>

<title>WTF ESPORTS</title>
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: linear-gradient(-45deg,#000,#0f2027,#2c5364,#000);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */

.main-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#000;
border-bottom:2px solid #00f7ff;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00f7ff;
text-shadow:0 0 10px #00f7ff;
}

/* MENU */

.menu{
display:flex;
flex-wrap:wrap;
}

.menu a{
color:white;
text-decoration:none;
margin-left:20px;
font-size:15px;
transition:0.3s;
}

.menu a:hover{
color:#00f7ff;
}

/* MOBILE MENU */

.menu-toggle{
display:none;
font-size:28px;
cursor:pointer;
color:#00f7ff;
}

/* HERO */

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1542751371-adc38448a05e") center/cover no-repeat;
}

.hero h1{
font-size:55px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff;
animation:heroGlow 3s infinite alternate;
}

@keyframes heroGlow{
0%{text-shadow:0 0 10px #00f7ff;}
100%{text-shadow:0 0 40px #00f7ff;}
}

/* COUNTDOWN */

#countdown{
margin-top:10px;
font-size:20px;
color:yellow;
}

/* SLOTS */

.slots{
padding:60px 20px;
background:#0f2027;
text-align:center;
}

.slot-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

.slot{
padding:20px;
background:#111;
border:1px solid #00f7ff;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.slot:hover{
background:#00f7ff;
color:black;
}

.booked{
background:red;
cursor:not-allowed;
}

/* PLAYERS */

.players{
padding:60px 20px;
background:#000;
text-align:center;
}

.playerItem{
background:#111;
padding:10px;
margin:10px auto;
max-width:400px;
border-radius:6px;
border:1px solid #00f7ff;
}

/* BUTTON */

button{
padding:10px 20px;
background:#00f7ff;
border:none;
border-radius:6px;
cursor:pointer;
margin:10px;
}

/* FOOTER */

footer{
background:#000;
text-align:center;
padding:20px;
border-top:1px solid #00f7ff;
}

/* MOBILE */

@media(max-width:768px){

.main-header{
flex-direction:column;
text-align:center;
}

.menu{
display:none;
flex-direction:column;
}

.menu.active{
display:flex;
}

.menu-toggle{
display:block;
}

.hero h1{
font-size:32px;
}

}

</style>

</head>

<body>

<header class="main-header">

<div class="logo">🎮 WTF ESPORTS</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav class="menu">

<a href="index.html">Home</a>
<a href="booking.html">Tournament</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="bracket.html">Bracket</a>
<a href="rules.html">Rules</a>
<a href="about.html">About Us</a>
<a href="contact.html">Contact</a>
<a href="player-login.html">Player Login</a>
<a href="admin.html">Admin</a>

</nav>

</header>

<section class="hero">

<h3>Players Online</h3>
<div id="onlinePlayers"></div>

<h1>🔥 FREE FIRE CHAMPIONSHIP</h1>

<h2 id="countdown"></h2>

<p>Hosted by WTF ESPORTS</p>

</section>

<section class="slots">

<h2>🔥 Tournament Slots (10)</h2>

<h3 id="playerCounter">Players Joined: 0 / 10</h3>

<div class="slot-grid" id="slots"></div>

<button id="adminResetBtn" onclick="resetSlots()" style="display:none;">
Admin Reset Slots
</button>

</section>

<section class="players">

<h2>🏆 Joined Players</h2>

<div id="joinedPlayers"></div>
<section class="commentary">

<h2>🎤 Match Commentary</h2>

<div id="aiCommentary"></div>


</section>

<footer>
WTF ESPORTS © 2026
</footer>

<script>

/* MOBILE MENU */

function toggleMenu(){
document.querySelector(".menu").classList.toggle("active");
}

/* ONLINE PLAYERS */

let count = localStorage.getItem("onlinePlayers") || 0;
count++;
localStorage.setItem("onlinePlayers",count);
document.getElementById("onlinePlayers").innerText=count;

/* COUNTDOWN */

let eventDate = new Date("2026-03-20 18:00:00").getTime();

setInterval(function(){

let now = new Date().getTime();
let distance = eventDate - now;

let days = Math.floor(distance/(1000*60*60*24));
let hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
let minutes = Math.floor((distance%(1000*60*60))/(1000*60));
let seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
"⏳ Tournament Starts In: "+
days+"d "+hours+"h "+minutes+"m "+seconds+"s";

},1000);

/* SLOT SYSTEM */

let slots = JSON.parse(localStorage.getItem("slots")) || Array(10).fill(null);

let slotContainer=document.getElementById("slots");

function renderSlots(){

slotContainer.innerHTML="";

slots.forEach((player,index)=>{

let div=document.createElement("div");

div.className="slot";

if(player){

div.classList.add("booked");

div.innerText="Slot "+(index+1)+"\n"+player.name;

}else{

div.innerText="Slot "+(index+1);

div.onclick=function(){

let name=prompt("Enter Player Name");

if(name){

slots[index]={name:name};

localStorage.setItem("slots",JSON.stringify(slots));

renderSlots();

}

};

}

slotContainer.appendChild(div);

});

}

renderSlots();

/* ADMIN RESET */

function resetSlots(){

let pass = prompt("Admin Password");

let adminPass = localStorage.getItem("adminPass");

if(pass === adminPass){

localStorage.removeItem("slots");

location.reload();

}else{

alert("Access Denied");

}

}

if(localStorage.getItem("adminLoggedIn")==="true"){
document.getElementById("adminResetBtn").style.display="block";
}
function generateCommentary(){

let players = JSON.parse(localStorage.getItem("slots")) || [];

let messages=[
"🔥 What a match!",
"⚡ Incredible gameplay!",
"🎯 Perfect strategy!",
"💥 Total domination!"
];

let randomMessage =
messages[Math.floor(Math.random()*messages.length)];

let randomPlayer = players.find(p => p !== null);

if(randomPlayer){

document.getElementById("aiCommentary").innerText =
randomMessage + " " + randomPlayer.name +
" is leading the battle!";

}

}

generateCommentary();

</script>

</body>
</html>
