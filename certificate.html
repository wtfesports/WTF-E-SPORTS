<!DOCTYPE html>
<html>
<head>

<title>Winner Certificate | WTF ESPORTS</title>

<style>

body{
background:black;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.certificate{

width:800px;
padding:40px;
text-align:center;

background-image:url("certificate-bg.jpg");
background-size:cover;

border:8px solid gold;
color:white;

}

.logo{
width:120px;
margin-bottom:20px;
}

.title{
font-size:40px;
color:gold;
}

.winner{
font-size:35px;
margin:20px 0;
color:#00f7ff;
}

.tournament{
font-size:20px;
}

.signature{
margin-top:40px;
}

.signature img{
width:120px;
}

button{
margin-top:30px;
padding:10px 20px;
background:#00f7ff;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="certificate">

<img src="wtf-logo.png" class="logo">

<h1 class="title">Certificate of Victory</h1>

<p>This certificate is awarded to</p>

<h2 class="winner" id="winnerName"></h2>

<p class="tournament">Winner of WTF ESPORTS Tournament</p>

<div class="signature">

<img src="admin-sign.png">

<p>Admin Signature</p>

</div>

<button onclick="window.print()">Download Certificate</button>

</div>

<script>

let winner = localStorage.getItem("winnerName");
let player = JSON.parse(localStorage.getItem("currentPlayer"));

if(player && player.team === winner){

document.getElementById("winnerName").innerText = winner;

}else{

document.body.innerHTML="<h1 style='color:white'>Certificate Not Available</h1>";

}

</script>

</body>
</html><!DOCTYPE html>
<html>
<head>
<title>Book Slot | WTF Esports</title>
<link rel="stylesheet" href="2.1style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
}

header{
padding:20px 60px;
background:#111;
text-align:center;
}

.logo{
font-size:24px;
color:#00f7ff;
font-weight:bold;
margin-bottom:10px;
}

nav{
margin-bottom:20px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

nav a:hover{
color:#00f7ff;
}

header h1{
font-size:40px;
color:gold;
text-shadow:0 0 20px gold;
margin-top:10px;
}

.form-section{
display:flex;
justify-content:center;
padding:40px;
}

form{
width:500px;
}

.row{
display:flex;
gap:20px;
margin-bottom:20px;
}

.box{
flex:1;
display:flex;
flex-direction:column;
}

input,select{
padding:10px;
margin-top:5px;
border:none;
border-radius:4px;
}

button{
padding:10px 20px;
background:#00f7ff;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:15px;
}

</style>
</head>

<body>

<header>

<div class="logo">🎮 WTF ESPORTS</div>

<nav>

<a href="index.html">Home</a>
<a href="booking.html">Tournament</a>
<a href="leaderboard.html">Leaderboard</a>
<a href="bracket.html">Bracket</a>
<a href="rules.html">Rules</a>
<a href="about.html">About Us</a>
<a href="contact.html">Contact</a>

<a href="player-login.html">Player Login</a>
<a href="admin.html">Admin</a>

</nav>

<h1>Book Your Slot</h1>

</header>

<div id="slotInfo" style="text-align:center;margin-top:20px;color:yellow;"></div>

<section class="form-section">

<form onsubmit="event.preventDefault(); saveData();">

<div class="row">

<div class="box">
<label>Team Name</label>
<input type="text" id="teamName" required>
</div>

<div class="box">
<label>Leader Name</label>
<input type="text" id="leaderName" required>
</div>

</div>

<div class="row">

<div class="box">
<label>Mobile Number</label>
<input type="text" id="mobile" required>
</div>

<div class="box">
<label>Game</label>
<select id="game" required>
<option value="">Select Game</option>
<option value="BGMI">BGMI</option>
<option value="Free Fire">Free Fire</option>
</select>
</div>

</div>

<div class="row">

<div class="box">
<label>Payment Mode</label>
<select id="paymentMode">
<option value="">Select Payment</option>
<option value="GPay">GPay</option>
<option value="PhonePe">PhonePe</option>
<option value="Paytm">Paytm</option>
<option value="UPI">UPI</option>
</select>
</div>

<div class="box">
<label>Team UID</label>
<input type="text" id="teamUID">
</div>

</div>

<label>Upload Payment Screenshot</label>
<input type="file" id="payment">

<button type="submit">Submit</button>

</form>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyBQWMagDvKjFSYaX-0ex2gGYT2AaucSIV8",
authDomain: "wtf-esports-victory-start-here.firebaseapp.com",
projectId: "wtf-esports-victory-start-here",
storageBucket: "wtf-esports-victory-start-here.firebasestorage.app",
messagingSenderId: "987957320998",
appId: "1:987957320998:web:f2211adc9f99d55f60f5e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

window.saveData = async function(){

let teamName=document.getElementById("teamName").value;
let leaderName=document.getElementById("leaderName").value;
let mobile=document.getElementById("mobile").value;
let game=document.getElementById("game").value;
let teamUID=document.getElementById("teamUID").value;

if(mobile.length!=10){
alert("Enter valid mobile number");
return;
}

if(teamName==""||leaderName==""||mobile==""||game==""){
alert("Fill all details");
return;
}

let players=JSON.parse(localStorage.getItem("players"))||[];
let maxSlots=30;

if(players.length>=maxSlots){
alert("Slots Full");
return;
}

const file=document.getElementById("payment").files[0];
let screenshotURL="";

if(file){

const storageRef=ref(storage,"payments/"+Date.now()+"_"+file.name);

await uploadBytes(storageRef,file);

screenshotURL=await getDownloadURL(storageRef);

}

let playerID="WTF"+Math.floor(1000+Math.random()*9000);
let username=leaderName.toLowerCase().replace(/\s/g,"")+Math.floor(Math.random()*100);
let password=Math.floor(100000+Math.random()*900000);

players.push({
id:playerID,
team:teamName,
leader:leaderName,
mobile:mobile,
game:game,
teamUID:teamUID,
username:username,
password:password
});

localStorage.setItem("players",JSON.stringify(players));

localStorage.setItem("currentPlayer",JSON.stringify({
name:leaderName,
team:teamName,
game:game
}));

try{

await addDoc(collection(db,"players"),{
team:teamName,
leader:leaderName,
mobile:mobile,
game:game,
teamUID:teamUID,
username:username,
password:password,
paymentScreenshot:screenshotURL,
status:"Pending",
createdAt:Date.now()
});

}catch(e){

alert("Firebase Save Error");
console.log(e);
return;

}

alert("Registration Successful!\n\nID: "+playerID+
"\nUsername: "+username+
"\nPassword: "+password);

setTimeout(()=>{

window.location.href="index.html";

},1500);

}

let players=JSON.parse(localStorage.getItem("players"))||[];
let maxSlots=30;

document.getElementById("slotInfo").innerHTML=
"Slots Remaining: "+(maxSlots-players.length);

</script>

</body>
</html>
